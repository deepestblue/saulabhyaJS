name: Zizmor audit

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  zizmor:
    name: Run zizmor auditor
    runs-on: ubuntu-22.04
    permissions:
      security-events: write # Required so zizmor-action can upload SARIF findings to code scanning.
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          persona: auditor
