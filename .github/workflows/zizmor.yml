name: Zizmor audit

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/zizmor.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  zizmor:
    name: Run zizmor auditor
    runs-on: ubuntu-22.04
    permissions:
      security-events: write # Required so zizmor-action can upload SARIF findings to code scanning.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          persona: auditor
